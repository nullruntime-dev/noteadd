name: noteadd releases
on:
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  docker-build:
    runs-on: self-hosted
    permissions: 
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to local registry
      uses: docker/login-action@v2
      with:
        url: ${{secrets.PRIVATE_DOCKER_REGISTRY_URL}}
        username: ${{ secrets.PRIVATE_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.PRIVATE_DOCKER_REGISTRY_PASSWORD }}
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        url: docker.io
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/noteadd:1.0.1

    
